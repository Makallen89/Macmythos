services:
  - type: web
    name: mac-mythos-api
    runtime: docker
    repo: https://github.com/yourusername/mac-mythos
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: macmythos-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: macmythos-redis
          property: connectionString
    healthCheckPath: /health

  - type: web
    name: mac-mythos-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://mac-mythos-api.onrender.com

databases:
  - name: macmythos-db
    databaseName: macmythos
    user: postgres

redis:
  - name: macmythos-redis
    ipAllowList: []
